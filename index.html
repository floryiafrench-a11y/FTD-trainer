<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTD — тренажёр по вопросам</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#d9e1ee;
      --line-strong:#c9d5e6;
      --text:#1f2937;
      --muted:#64748b;
      --blue:#3b82f6;
      --blue-soft:#eaf2ff;
      --green:#22c55e;
      --green-soft:#e8f8ee;
      --red:#ef4444;
      --red-soft:#fdeced;
      --shadow:0 12px 30px rgba(16,24,40,.06);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.5;
    }

    .app{
      max-width: 1460px;
      margin: 0 auto;
      padding: 24px;
      display:grid;
      grid-template-columns:minmax(0, 1fr) 360px;
      gap:24px;
      align-items:start;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      min-width:0;
    }

    .main{
      padding:28px;
      min-width:0;
    }

    .sidebar{
      position:sticky;
      top:20px;
      padding:20px;
      max-height:calc(100vh - 40px);
      overflow:auto;
      min-width:0;
    }

    .title{
      font-size:clamp(26px, 3vw, 36px);
      line-height:1.15;
      margin:0 0 8px;
      overflow-wrap:anywhere;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:15px;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin:24px 0 28px;
    }

    button, .button{
      appearance:none;
      border:1px solid var(--line-strong);
      background:#fff;
      color:var(--text);
      border-radius:16px;
      padding:12px 16px;
      font:inherit;
      font-weight:600;
      cursor:pointer;
      transition:.15s ease;
    }

    button:hover{
      transform:translateY(-1px);
      border-color:#b8c7dc;
    }

    button.primary{
      background:var(--blue);
      color:#fff;
      border-color:var(--blue);
    }

    button.ghost{
      background:#fff;
    }

    button.small{
      padding:9px 12px;
      border-radius:14px;
      font-size:14px;
    }

    .question-meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:16px;
    }

    .chip{
      border:1px solid var(--line);
      background:#f8fafc;
      padding:8px 12px;
      border-radius:999px;
      font-size:14px;
      color:#334155;
    }

    .question-text{
      font-size:22px;
      font-weight:700;
      line-height:1.35;
      margin:0 0 22px;
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    .help{
      color:var(--muted);
      font-size:14px;
      margin:0 0 18px;
    }

    .options{
      display:grid;
      gap:14px;
      min-width:0;
    }

    .option-card{
      display:flex;
      align-items:flex-start;
      gap:14px;
      padding:16px 18px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      cursor:pointer;
      transition:.15s ease;
      min-width:0;
    }

    .option-card:hover{
      border-color:#bdd0ef;
      background:#fbfdff;
    }

    .option-card input{
      margin-top:4px;
      transform:scale(1.15);
      flex:0 0 auto;
    }

    .option-label{
      font-weight:700;
      min-width:24px;
    }

    .option-content{
      overflow-wrap:anywhere;
      word-break:break-word;
      min-width:0;
      flex:1 1 auto;
    }

    .feedback{
      margin-top:24px;
      padding:18px 20px;
      border-radius:20px;
      border:1px solid var(--line);
      background:#f8fafc;
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    .feedback.correct{
      border-color:#a7e4be;
      background:var(--green-soft);
    }

    .feedback.incorrect{
      border-color:#f4b6bb;
      background:var(--red-soft);
    }

    .feedback-title{
      font-size:22px;
      font-weight:800;
      margin:0 0 8px;
    }

    .feedback p{
      margin:6px 0 0;
    }

    .correct-answer{
      margin-top:10px;
      font-weight:600;
    }

    .layout-note{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
    }

    .text-answer{
      width:100%;
      min-height:130px;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 16px;
      font:inherit;
      resize:vertical;
      background:#fff;
      color:var(--text);
    }

    .text-answer:focus, select:focus{
      outline:2px solid rgba(59,130,246,.15);
      border-color:var(--blue);
    }

    .matching-wrap{
      display:grid;
      grid-template-columns:minmax(0,1fr);
      gap:18px;
    }

    .matching-legend{
      padding:16px 18px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fbfcfe;
    }

    .matching-legend h3{
      margin:0 0 10px;
      font-size:16px;
    }

    .matching-legend ol{
      margin:0;
      padding-left:20px;
    }

    .matching-legend li{
      margin:6px 0;
      overflow-wrap:anywhere;
    }

    .matching-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) 180px;
      gap:14px;
      align-items:center;
      padding:16px 18px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      min-width:0;
    }

    .matching-left{
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    select{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:14px;
      font:inherit;
      background:#fff;
    }

    .sequence-list{
      display:grid;
      gap:12px;
      margin-bottom:18px;
    }

    .sequence-item{
      display:flex;
      gap:12px;
      align-items:flex-start;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      min-width:0;
    }

    .badge{
      width:34px;
      height:34px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:#eff6ff;
      color:#1d4ed8;
      font-weight:800;
      flex:0 0 auto;
    }

    .sequence-controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:14px;
    }

    .sequence-pick{
      min-width:56px;
      justify-content:center;
      display:inline-flex;
      align-items:center;
    }

    .sequence-pick.used{
      opacity:.45;
      cursor:not-allowed;
      background:#f8fafc;
    }

    .current-sequence{
      padding:16px 18px;
      border:1px dashed var(--line-strong);
      border-radius:18px;
      background:#fbfdff;
      font-weight:700;
      min-height:58px;
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:8px;
    }

    .sequence-token{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:38px;
      height:38px;
      padding:0 12px;
      border-radius:999px;
      background:#e8f0ff;
      color:#1d4ed8;
      font-weight:800;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
      margin:6px 0 18px;
    }

    .stat{
      border:1px solid var(--line);
      background:#f8fafc;
      border-radius:18px;
      padding:14px 12px;
      text-align:center;
      min-width:0;
    }

    .stat .value{
      display:block;
      font-size:24px;
      font-weight:800;
      line-height:1;
      margin-bottom:6px;
    }

    .stat .label{
      display:block;
      color:var(--muted);
      font-size:13px;
    }

    .nav-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:18px 0 12px;
    }

    .nav-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(58px, 1fr));
      gap:12px;
      min-width:0;
    }

    .nav-btn{
      width:100%;
      min-width:0;
      min-height:58px;
      padding:12px 8px;
      border-radius:18px;
      font-weight:800;
      font-size:18px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .nav-btn.current{
      border-color:var(--blue);
      box-shadow:inset 0 0 0 2px var(--blue);
      background:var(--blue-soft);
      color:#1d4ed8;
    }

    .nav-btn.correct{
      border-color:#76d69a;
      background:#dff5e7;
      color:#166534;
    }

    .nav-btn.incorrect{
      border-color:#f2a0a7;
      background:#fde8ea;
      color:#991b1b;
    }

    .footer-note{
      margin-top:16px;
      color:var(--muted);
      font-size:13px;
    }

    @media (max-width: 1120px){
      .app{
        grid-template-columns:1fr;
      }
      .sidebar{
        position:static;
        max-height:none;
      }
    }

    @media (max-width: 720px){
      .app{padding:14px}
      .main,.sidebar{padding:18px}
      .question-text{font-size:19px}
      .matching-row{
        grid-template-columns:1fr;
      }
      .stats{
        grid-template-columns:1fr 1fr 1fr;
      }
      .nav-grid{
        grid-template-columns:repeat(auto-fit, minmax(52px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel main">
      <h1 class="title">FTD — тренажёр по вопросам</h1>
      <p class="subtitle" id="subtitle">Загрузка банка вопросов…</p>

      <div class="toolbar">
        <button class="ghost" id="prevBtn">← Назад</button>
        <button class="primary" id="checkBtn">Проверить</button>
        <button class="ghost" id="nextBtn">Дальше →</button>
        <button class="ghost" id="randomBtn">Случайный вопрос</button>
        <button class="ghost" id="resetBtn">Сбросить прогресс</button>
      </div>

      <div class="question-meta">
        <div class="chip" id="counterChip">Вопрос 1</div>
        <div class="chip" id="typeChip">Тип вопроса</div>
      </div>

      <h2 class="question-text" id="questionText"></h2>
      <p class="help" id="questionHelp"></p>

      <div id="answerArea"></div>
      <div id="feedbackMount"></div>
    </section>

    <aside class="panel sidebar">
      <div class="stats">
        <div class="stat">
          <span class="value" id="answeredStat">0</span>
          <span class="label">Отвечено</span>
        </div>
        <div class="stat">
          <span class="value" id="correctStat">0</span>
          <span class="label">Верно</span>
        </div>
        <div class="stat">
          <span class="value" id="incorrectStat">0</span>
          <span class="label">Неверно</span>
        </div>
      </div>

      <div class="nav-header">
        <strong>Навигация</strong>
        <button class="small" id="nextUnansweredBtn">След. без ответа</button>
      </div>
      <div class="nav-grid" id="navGrid"></div>

      <p class="footer-note">
        Прогресс сохраняется в браузере на этом устройстве. Открытые ответы проверяются по ключевым словам и допустимым вариантам.
      </p>
    </aside>
  </div>

  <script src="questions.js"></script>
  <script>
    const QUESTIONS = Array.isArray(window.QUESTIONS) ? window.QUESTIONS : [];
    const META = window.QUESTION_BANK_META || {};
    const STORAGE_KEY = 'ftd-trainer-progress';

    const state = {
      index: 0,
      progress: loadProgress(),
      sequenceDraft: []
    };

    const els = {
      subtitle: document.getElementById('subtitle'),
      counterChip: document.getElementById('counterChip'),
      typeChip: document.getElementById('typeChip'),
      questionText: document.getElementById('questionText'),
      questionHelp: document.getElementById('questionHelp'),
      answerArea: document.getElementById('answerArea'),
      feedbackMount: document.getElementById('feedbackMount'),
      navGrid: document.getElementById('navGrid'),
      answeredStat: document.getElementById('answeredStat'),
      correctStat: document.getElementById('correctStat'),
      incorrectStat: document.getElementById('incorrectStat'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      checkBtn: document.getElementById('checkBtn'),
      randomBtn: document.getElementById('randomBtn'),
      resetBtn: document.getElementById('resetBtn'),
      nextUnansweredBtn: document.getElementById('nextUnansweredBtn')
    };

    const TYPE_LABELS = {
      single: 'Один правильный ответ',
      multiple: 'Несколько правильных ответов',
      matching: 'Установление соответствия',
      sequence: 'Последовательность',
      text: 'Открытый ответ'
    };

    function loadProgress(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : { items:{}, currentIndex:0 };
      }catch{
        return { items:{}, currentIndex:0 };
      }
    }

    function saveProgress(){
      state.progress.currentIndex = state.index;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    function questionKey(q){
      return `${q.type}::${q.question}`;
    }

    function normalizeText(text){
      return String(text || '')
        .toLowerCase()
        .replace(/ё/g,'е')
        .replace(/[«»"']/g,' ')
        .replace(/[()]/g,' ')
        .replace(/[—–-]/g,' ')
        .replace(/[.,!?]/g,' ')
        .replace(/\s+/g,' ')
        .trim();
    }

    function tokenize(text){
      const stop = new Set(['это','как','для','что','или','при','без','его','ее','их','над','под','надо','если','уже','также','может','быть','когда','чтобы','который','которая','которые','которое','из','на','в','во','по','и','а','но','не','с','со','до','от','за','об','о','же','то','ли','же','к','ко','у','минимум','нужно','важно']);
      return normalizeText(text)
        .split(' ')
        .filter(Boolean)
        .filter(word => word.length > 3 && !stop.has(word));
    }

    function levenshtein(a,b){
      if (a === b) return 0;
      if (!a.length) return b.length;
      if (!b.length) return a.length;
      const matrix = Array.from({length: b.length + 1}, () => []);
      for(let i=0;i<=b.length;i++) matrix[i][0] = i;
      for(let j=0;j<=a.length;j++) matrix[0][j] = j;
      for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
          const cost = b[i-1] === a[j-1] ? 0 : 1;
          matrix[i][j] = Math.min(
            matrix[i-1][j] + 1,
            matrix[i][j-1] + 1,
            matrix[i-1][j-1] + cost
          );
        }
      }
      return matrix[b.length][a.length];
    }

    function stemsClose(user, correct){
      const a = normalizeText(user);
      const b = normalizeText(correct);
      if (!a || !b) return false;
      if (a === b) return true;
      if ((a.includes(b) || b.includes(a)) && Math.min(a.length,b.length) >= 5) return true;
      const aWords = a.split(' ');
      const bWords = b.split(' ');
      if (aWords.length === 1 && bWords.length === 1){
        if (a.slice(0,5) === b.slice(0,5)) return true;
        const dist = levenshtein(a,b);
        const longest = Math.max(a.length,b.length);
        if (longest <= 14 && dist <= 2) return true;
      }
      return false;
    }

    function extractRequiredCount(question){
      const q = normalizeText(question);
      const digitMatch = q.match(/(?:минимум|не менее|перечислите|назовите)\s+(\d+)/);
      if (digitMatch) return Number(digitMatch[1]);
      if (/минимум три|не менее трех|перечислите три|назовите три/.test(q)) return 3;
      if (/минимум два|перечислите два|назовите два/.test(q)) return 2;
      return null;
    }

    function parseItemGroups(answer){
      const normalized = String(answer || '');
      const parts = normalized.split(/допускается:/i).map(s => s.trim()).filter(Boolean);
      return parts.map(part => {
        return part
          .split(/[;,]/)
          .map(s => s.trim())
          .filter(Boolean)
          .map(s => normalizeText(s));
      }).filter(group => group.length);
    }

    function splitAlternatives(answer){
      const raw = String(answer || '').trim();
      if (raw.includes(' / ')){
        return raw.split(/\s*\/\s*/).map(s => s.trim()).filter(Boolean);
      }
      return [raw];
    }

    function keywordScore(user, correct){
      const userTokens = new Set(tokenize(user));
      const correctTokens = Array.from(new Set(tokenize(correct)));
      if (!correctTokens.length) return 0;
      let hits = 0;
      for(const token of correctTokens){
        if (userTokens.has(token)) hits += 1;
      }
      return hits / correctTokens.length;
    }

    function checkOpenText(userAnswer, correctAnswer, question){
      const user = String(userAnswer || '').trim();
      if (!user) return false;
      const normalizedUser = normalizeText(user);
      const requiredCount = extractRequiredCount(question);

      // Case 1: enumerations / list-based questions
      if (requiredCount){
        const groups = parseItemGroups(correctAnswer);
        for (const group of groups){
          let found = 0;
          for (const item of group){
            if (item && normalizedUser.includes(item)) found += 1;
          }
          if (found >= Math.min(requiredCount, group.length)) return true;
        }
      }

      // Case 2: direct alternatives
      const alternatives = splitAlternatives(correctAnswer);
      for (const alt of alternatives){
        const normalizedAlt = normalizeText(alt);
        if (!normalizedAlt) continue;
        if (normalizedUser === normalizedAlt || normalizedUser.includes(normalizedAlt) || normalizedAlt.includes(normalizedUser)) return true;
        if (stemsClose(normalizedUser, normalizedAlt)) return true;
      }

      // Case 3: approximate match for definitional answers
      if (keywordScore(user, correctAnswer) >= 0.55) return true;
      const correctTokens = Array.from(new Set(tokenize(correctAnswer)));
      const userTokens = new Set(tokenize(user));
      let common = 0;
      for (const token of correctTokens){
        if (userTokens.has(token)) common += 1;
      }
      if (common >= 3 && common / Math.max(correctTokens.length,1) >= 0.45) return true;

      return false;
    }

    function renderNav(){
      els.navGrid.innerHTML = '';
      QUESTIONS.forEach((q, idx) => {
        const key = questionKey(q);
        const item = state.progress.items[key];
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.textContent = String(idx + 1);
        if (idx === state.index) btn.classList.add('current');
        if (item?.status === 'correct') btn.classList.add('correct');
        if (item?.status === 'incorrect') btn.classList.add('incorrect');
        btn.addEventListener('click', () => {
          state.index = idx;
          state.sequenceDraft = [];
          render();
        });
        els.navGrid.appendChild(btn);
      });
    }

    function updateStats(){
      const values = Object.values(state.progress.items);
      const answered = values.length;
      const correct = values.filter(item => item.status === 'correct').length;
      const incorrect = values.filter(item => item.status === 'incorrect').length;
      els.answeredStat.textContent = String(answered);
      els.correctStat.textContent = String(correct);
      els.incorrectStat.textContent = String(incorrect);
    }

    function currentQuestion(){
      return QUESTIONS[state.index];
    }

    function renderHelp(question){
      switch(question.type){
        case 'single':
          return 'Выберите один вариант и нажмите «Проверить».';
        case 'multiple':
          return 'Выберите все правильные варианты и нажмите «Проверить».';
        case 'matching':
          return 'Для каждого пункта слева выберите подходящий номер справа.';
        case 'sequence':
          return 'Нажимайте на номера в правильном порядке. Если ошиблись — очистите или удалите последний номер.';
        case 'text':
          return 'Введите ответ. Для открытых вопросов используется проверка по ключевым словам и допустимым вариантам.';
        default:
          return '';
      }
    }

    function renderQuestion(){
      const q = currentQuestion();
      els.counterChip.textContent = `Вопрос ${state.index + 1} из ${QUESTIONS.length}`;
      els.typeChip.textContent = TYPE_LABELS[q.type] || q.type;
      els.questionText.textContent = q.question;
      els.questionHelp.textContent = renderHelp(q);
      els.answerArea.innerHTML = '';
      els.feedbackMount.innerHTML = '';

      if (q.type === 'single' || q.type === 'multiple'){
        const wrapper = document.createElement('div');
        wrapper.className = 'options';
        q.options.forEach(opt => {
          const label = document.createElement('label');
          label.className = 'option-card';
          label.innerHTML = `
            <input type="${q.type === 'single' ? 'radio' : 'checkbox'}" name="answer" value="${escapeHtml(opt.id)}">
            <span class="option-label">${escapeHtml(opt.id)}</span>
            <span class="option-content">${escapeHtml(opt.text)}</span>
          `;
          wrapper.appendChild(label);
        });
        els.answerArea.appendChild(wrapper);
      }

      if (q.type === 'matching'){
        const wrap = document.createElement('div');
        wrap.className = 'matching-wrap';

        const legend = document.createElement('div');
        legend.className = 'matching-legend';
        legend.innerHTML = `<h3>Варианты справа</h3><ol>${q.right.map(item => `<li><strong>${escapeHtml(item.id)}</strong> — ${escapeHtml(item.text)}</li>`).join('')}</ol>`;
        wrap.appendChild(legend);

        q.left.forEach(item => {
          const row = document.createElement('div');
          row.className = 'matching-row';
          row.innerHTML = `
            <div class="matching-left"><strong>${escapeHtml(item.id)}</strong> — ${escapeHtml(item.text)}</div>
            <select data-left="${escapeHtml(item.id)}">
              <option value="">— выберите —</option>
              ${q.right.map(r => `<option value="${escapeHtml(r.id)}">${escapeHtml(r.id)}</option>`).join('')}
            </select>
          `;
          wrap.appendChild(row);
        });
        els.answerArea.appendChild(wrap);
      }

      if (q.type === 'sequence'){
        const list = document.createElement('div');
        list.className = 'sequence-list';
        q.options.forEach(item => {
          const el = document.createElement('div');
          el.className = 'sequence-item';
          el.innerHTML = `<span class="badge">${escapeHtml(item.id)}</span><div>${escapeHtml(item.text)}</div>`;
          list.appendChild(el);
        });
        const controls = document.createElement('div');
        controls.className = 'sequence-controls';
        q.options.forEach(item => {
          const btn = document.createElement('button');
          btn.className = 'sequence-pick';
          btn.textContent = item.id;
          if (state.sequenceDraft.includes(item.id)) btn.classList.add('used');
          btn.disabled = state.sequenceDraft.includes(item.id);
          btn.addEventListener('click', () => {
            if (!state.sequenceDraft.includes(item.id)){
              state.sequenceDraft.push(item.id);
              renderQuestion();
            }
          });
          controls.appendChild(btn);
        });

        const meta = document.createElement('div');
        meta.className = 'toolbar';
        meta.style.margin = '0 0 14px';
        meta.innerHTML = `
          <button class="small ghost" id="clearSeqBtn" type="button">Очистить</button>
          <button class="small ghost" id="undoSeqBtn" type="button">Удалить последний</button>
        `;

        const current = document.createElement('div');
        current.className = 'current-sequence';
        current.innerHTML = state.sequenceDraft.length
          ? state.sequenceDraft.map(token => `<span class="sequence-token">${escapeHtml(token)}</span>`).join('')
          : '<span style="color:var(--muted)">Пока ничего не выбрано</span>';

        els.answerArea.appendChild(list);
        els.answerArea.appendChild(controls);
        els.answerArea.appendChild(meta);
        els.answerArea.appendChild(current);

        meta.querySelector('#clearSeqBtn').addEventListener('click', () => {
          state.sequenceDraft = [];
          renderQuestion();
        });
        meta.querySelector('#undoSeqBtn').addEventListener('click', () => {
          state.sequenceDraft.pop();
          renderQuestion();
        });
      }

      if (q.type === 'text'){
        const area = document.createElement('textarea');
        area.className = 'text-answer';
        area.id = 'textAnswer';
        area.placeholder = 'Введите ваш ответ…';
        els.answerArea.appendChild(area);
      }

      restorePreviousAttempt(q);
    }

    function restorePreviousAttempt(question){
      const item = state.progress.items[questionKey(question)];
      if (!item || !item.lastAnswer) return;

      if (question.type === 'single'){
        const input = els.answerArea.querySelector(`input[value="${CSS.escape(item.lastAnswer)}"]`);
        if (input) input.checked = true;
      }

      if (question.type === 'multiple'){
        const values = Array.isArray(item.lastAnswer) ? item.lastAnswer : [];
        values.forEach(val => {
          const input = els.answerArea.querySelector(`input[value="${CSS.escape(val)}"]`);
          if (input) input.checked = true;
        });
      }

      if (question.type === 'matching'){
        Object.entries(item.lastAnswer).forEach(([left, right]) => {
          const select = els.answerArea.querySelector(`select[data-left="${CSS.escape(left)}"]`);
          if (select) select.value = right;
        });
      }

      if (question.type === 'sequence'){
        state.sequenceDraft = Array.isArray(item.lastAnswer) ? [...item.lastAnswer] : [];
        // If we mutated draft after render, refresh once.
        requestAnimationFrame(() => {
          const current = els.answerArea.querySelector('.current-sequence');
          if (current){
            current.innerHTML = state.sequenceDraft.length
              ? state.sequenceDraft.map(token => `<span class="sequence-token">${escapeHtml(token)}</span>`).join('')
              : '<span style="color:var(--muted)">Пока ничего не выбрано</span>';
          }
          els.answerArea.querySelectorAll('.sequence-pick').forEach(btn => {
            if (state.sequenceDraft.includes(btn.textContent.trim())){
              btn.classList.add('used');
              btn.disabled = true;
            }
          });
        });
      }

      if (question.type === 'text'){
        const area = els.answerArea.querySelector('#textAnswer');
        if (area) area.value = item.lastAnswer;
      }
    }

    function getUserAnswer(question){
      if (question.type === 'single'){
        const checked = els.answerArea.querySelector('input[name="answer"]:checked');
        return checked ? checked.value : '';
      }
      if (question.type === 'multiple'){
        return Array.from(els.answerArea.querySelectorAll('input[name="answer"]:checked')).map(input => input.value).sort();
      }
      if (question.type === 'matching'){
        const result = {};
        els.answerArea.querySelectorAll('select[data-left]').forEach(select => {
          result[select.dataset.left] = select.value;
        });
        return result;
      }
      if (question.type === 'sequence'){
        return [...state.sequenceDraft];
      }
      if (question.type === 'text'){
        return els.answerArea.querySelector('#textAnswer')?.value?.trim() || '';
      }
      return '';
    }

    function isCorrect(question, userAnswer){
      if (question.type === 'single'){
        return userAnswer === question.answer[0];
      }
      if (question.type === 'multiple'){
        const correct = [...question.answer].sort();
        return JSON.stringify(userAnswer) === JSON.stringify(correct);
      }
      if (question.type === 'matching'){
        const correctMap = Object.fromEntries(question.answer.map(item => [item.left, item.right]));
        return question.left.every(item => userAnswer[item.id] && userAnswer[item.id] === correctMap[item.id]);
      }
      if (question.type === 'sequence'){
        return JSON.stringify(userAnswer) === JSON.stringify(question.answer);
      }
      if (question.type === 'text'){
        return checkOpenText(userAnswer, question.answer, question.question);
      }
      return false;
    }

    function formatCorrectAnswer(question){
      if (question.type === 'single'){
        const opt = question.options.find(item => item.id === question.answer[0]);
        return opt ? `${opt.id}) ${opt.text}` : question.answer[0];
      }
      if (question.type === 'multiple'){
        return question.answer.map(id => {
          const opt = question.options.find(item => item.id === id);
          return opt ? `${opt.id}) ${opt.text}` : id;
        }).join('; ');
      }
      if (question.type === 'matching'){
        const rightMap = Object.fromEntries(question.right.map(item => [item.id, item.text]));
        return question.answer.map(item => `${item.left} → ${item.right} (${rightMap[item.right] || ''})`).join('; ');
      }
      if (question.type === 'sequence'){
        return question.answer.join(' → ');
      }
      return question.answer;
    }

    function showFeedback(ok, question){
      const wrap = document.createElement('div');
      wrap.className = `feedback ${ok ? 'correct' : 'incorrect'}`;
      wrap.innerHTML = `
        <div class="feedback-title">${ok ? 'Верно' : 'Неверно'}</div>
        ${ok ? '<p>Ответ засчитан.</p>' : `<p>Попробуйте ещё раз и сверяйтесь с правильной формулировкой.</p><p class="correct-answer">Правильный ответ: ${escapeHtml(formatCorrectAnswer(question))}</p>`}
      `;
      els.feedbackMount.innerHTML = '';
      els.feedbackMount.appendChild(wrap);
    }

    function handleCheck(){
      const q = currentQuestion();
      const userAnswer = getUserAnswer(q);

      if (q.type === 'single' && !userAnswer){
        showInlineNotice('Сначала выберите один вариант.');
        return;
      }
      if (q.type === 'multiple' && (!Array.isArray(userAnswer) || !userAnswer.length)){
        showInlineNotice('Сначала выберите хотя бы один вариант.');
        return;
      }
      if (q.type === 'matching'){
        const allFilled = q.left.every(item => userAnswer[item.id]);
        if (!allFilled){
          showInlineNotice('Нужно заполнить все соответствия.');
          return;
        }
      }
      if (q.type === 'sequence' && userAnswer.length !== q.answer.length){
        showInlineNotice(`Нужно задать полную последовательность из ${q.answer.length} пунктов.`);
        return;
      }
      if (q.type === 'text' && !String(userAnswer).trim()){
        showInlineNotice('Введите ответ.');
        return;
      }

      const ok = isCorrect(q, userAnswer);
      state.progress.items[questionKey(q)] = {
        status: ok ? 'correct' : 'incorrect',
        lastAnswer: userAnswer,
        checkedAt: new Date().toISOString()
      };
      saveProgress();
      updateStats();
      renderNav();
      showFeedback(ok, q);
    }

    function showInlineNotice(text){
      const wrap = document.createElement('div');
      wrap.className = 'feedback';
      wrap.innerHTML = `<div class="feedback-title" style="font-size:18px">Пока не проверено</div><p>${escapeHtml(text)}</p>`;
      els.feedbackMount.innerHTML = '';
      els.feedbackMount.appendChild(wrap);
    }

    function escapeHtml(text){
      return String(text)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }

    function nextUnansweredIndex(){
      for(let i = state.index + 1; i < QUESTIONS.length; i++){
        if (!state.progress.items[questionKey(QUESTIONS[i])]) return i;
      }
      for(let i = 0; i < QUESTIONS.length; i++){
        if (!state.progress.items[questionKey(QUESTIONS[i])]) return i;
      }
      return -1;
    }

    function render(){
      if (!QUESTIONS.length){
        els.subtitle.textContent = 'Банк вопросов не найден.';
        return;
      }
      const generated = META.generatedAt ? `Обновлено: ${META.generatedAt.replace('T',' ')}` : 'Банк вопросов загружен';
      els.subtitle.textContent = `${generated}. Вопросов: ${QUESTIONS.length}. Колонка ID в тренажёре не используется.`;
      updateStats();
      renderQuestion();
      renderNav();
      saveProgress();
    }

    els.prevBtn.addEventListener('click', () => {
      state.index = state.index > 0 ? state.index - 1 : QUESTIONS.length - 1;
      state.sequenceDraft = [];
      render();
    });

    els.nextBtn.addEventListener('click', () => {
      state.index = state.index < QUESTIONS.length - 1 ? state.index + 1 : 0;
      state.sequenceDraft = [];
      render();
    });

    els.randomBtn.addEventListener('click', () => {
      state.index = Math.floor(Math.random() * QUESTIONS.length);
      state.sequenceDraft = [];
      render();
    });

    els.checkBtn.addEventListener('click', handleCheck);

    els.resetBtn.addEventListener('click', () => {
      const ok = confirm('Сбросить весь прогресс в этом браузере?');
      if (!ok) return;
      state.progress = { items:{}, currentIndex:0 };
      state.sequenceDraft = [];
      localStorage.removeItem(STORAGE_KEY);
      render();
    });

    els.nextUnansweredBtn.addEventListener('click', () => {
      const idx = nextUnansweredIndex();
      if (idx >= 0){
        state.index = idx;
        state.sequenceDraft = [];
        render();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight'){
        els.nextBtn.click();
      }
      if (event.key === 'ArrowLeft'){
        els.prevBtn.click();
      }
    });

    if (typeof state.progress.currentIndex === 'number' && state.progress.currentIndex < QUESTIONS.length){
      state.index = state.progress.currentIndex;
    }

    render();
  </script>
</body>
</html>
